/* ===== SAVE / DELETE ===== */
function saveEvent() {
  const name = document.getElementById('inp-name').value.trim();
  const date = document.getElementById('inp-date').value;
  const note = document.getElementById('inp-note').value.trim();

  if (!name) { shake('inp-name'); return; }
  if (!date)  { shake('inp-date'); return; }

  const reminderDays = reminderActive
    ? Array.from(document.querySelectorAll('.day-chip.selected')).map(c => Number(c.dataset.days))
    : [];

  const ev = {
    id: editingId || Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    name, date, note,
    type:     selectedType,
    category: selectedCat || null,
    color:    selectedColor || null,
    reminder: reminderActive && reminderDays.length > 0,
    reminderDays,
    createdAt: editingId ? (events.find(e=>e.id===editingId)?.createdAt || Date.now()) : Date.now()
  };

  if (editingId) {
    const idx = events.findIndex(e => e.id === editingId);
    events[idx] = ev;
  } else {
    events.push(ev);
  }

  save();
  renderEvents();
  closeModal();
  toast(editingId ? `«${name}» обновлено` : `«${name}» добавлено`);
  scheduleReminders();
}

function deleteEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  if (!confirm(`Удалить «${ev.name}»?`)) return;
  events = events.filter(e => e.id !== id);
  save();
  renderEvents();
  toast(`«${ev.name}» удалено`);
}

function loadEvents() {
  return JSON.parse(localStorage.getItem('countdown_events') || '[]');
}

function saveEvents(arr) {
  events = arr;
  localStorage.setItem('countdown_events', JSON.stringify(arr));
}

function save() {
  localStorage.setItem('countdown_events', JSON.stringify(events));
}

function shake(id) {
  const el = document.getElementById(id);
  el.style.borderColor = 'var(--red)';
  el.style.animation = 'shake 0.3s ease';
  setTimeout(() => { el.style.animation = ''; el.style.borderColor = ''; }, 400);
}

/* ===== TOAST ===== */
function toast(msg, duration=3000) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(20px)'; t.style.transition='all 0.3s';
    setTimeout(() => t.remove(), 300);
  }, duration);
}

/* ===== NOTIFICATIONS ===== */
function requestNotificationPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') toast('Уведомления включены ✓');
      else toast('Уведомления отклонены — напоминания будут показаны внутри приложения');
    });
  }
}

function scheduleReminders() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = today();
  events.forEach(ev => {
    if (!ev.reminder) return;
    ev.reminderDays.forEach(days => {
      const target = new Date(parseDate(ev.date));
      target.setDate(target.getDate() - days);
      const msUntil = target - now;
      if (msUntil >= 0 && msUntil < 86400000 * 2) {
        setTimeout(() => {
          new Notification(`Напоминание: ${ev.name}`, {
            body: days === 0 ? 'Событие сегодня!' : `До события осталось ${days} ${pluralDays(days)}`,
            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><text y="28" font-size="28">📅</text></svg>'
          });
        }, msUntil > 0 ? msUntil : 0);
      }
    });
  });
}

function checkDailyReminders() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const t = today();
  events.forEach(ev => {
    if (!ev.reminder) return;
    const diff = diffDays(ev.date);
    ev.reminderDays.forEach(days => {
      if (diff === days) {
        setTimeout(() => {
          new Notification(`Напоминание: ${ev.name}`, {
            body: days === 0 ? 'Событие сегодня!' : `До события осталось ${days} ${pluralDays(days)}`,
          });
        }, 500);
        if (days === 0 || days === 1) {
          toast(`<strong>🔔 ${ev.name}</strong><br>${days===0?'Событие сегодня!':'Событие завтра!'}`);
        }
      }
    });
  });
}

/* ===== EXPORT ICS ===== */
function exportICS(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;

  const [y, m, d] = ev.date.split('-').map(Number);
  const dtStart = `${String(y).padStart(4,'0')}${String(m).padStart(2,'0')}${String(d).padStart(2,'0')}`;
  // DTEND = next day
  const end = new Date(y, m - 1, d + 1);
  const dtEnd = `${end.getFullYear()}${String(end.getMonth()+1).padStart(2,'0')}${String(end.getDate()).padStart(2,'0')}`;

  const rrule  = (ev.type !== 'once') ? '\r\nRRULE:FREQ=YEARLY' : '';
  const desc   = ev.note ? `DESCRIPTION:${ev.note.replace(/\n/g,' ')}\r\n` : '';
  const cat    = ev.category ? categories[ev.category]?.name : '';
  const catStr = cat ? `CATEGORIES:${cat}\r\n` : '';
  const uid    = `${ev.id}@countdown-app`;

  const ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Обратный отсчёт//RU',
    'CALSCALE:GREGORIAN',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTART;VALUE=DATE:${dtStart}`,
    `DTEND;VALUE=DATE:${dtEnd}`,
    `SUMMARY:${ev.name}${rrule}`,
    `${desc}${catStr}END:VEVENT`,
    'END:VCALENDAR',
  ].join('\r\n');

  const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `${ev.name.replace(/[^а-яёa-z0-9]/gi,'_')}.ics`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast(`Добавлен в календарь: <strong>${escapeHtml(ev.name)}</strong> ✓`);
}

/* ===== SHARE EVENT ===== */
async function shareEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;

  const ann = calcAnnual(ev.date);
  const cat = ev.category ? categories[ev.category] : null;

  let timeText;
  if (ann.isToday) {
    timeText = 'Сегодня! 🎉';
  } else if (ev.type === 'once') {
    const dur = calcDuration(ev.date);
    const val = fmtPartsPlain(dur);
    timeText = dur.direction === 'future' ? `Через: ${val}` : `Прошло: ${val}`;
  } else {
    timeText = `Прошло: ${fmtPartsPlain(ann.passed)} · Через: ${fmtPartsPlain(ann.remaining)}`;
  }

  const emoji  = cat ? cat.emoji + ' ' : '📅 ';
  const catStr = cat ? ` (${cat.name})` : '';
  const note   = ev.note ? `\n📝 ${ev.note}` : '';
  const text   = `${emoji}${ev.name}${catStr}\n📆 ${formatDateRu(ev.date)}\n${timeText}${note}`;

  try {
    if (navigator.share) {
      await navigator.share({ title: ev.name, text });
    } else {
      await navigator.clipboard.writeText(text);
      toast('Скопировано в буфер обмена ✓');
    }
  } catch {
    // fallback: textarea copy
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    toast('Скопировано в буфер обмена ✓');
  }
}

/* Текстовая версия fmtParts без HTML тегов */
function fmtPartsPlain(d) {
  const p = [];
  if (d.years  > 0) p.push(`${d.years} ${pluralYears(d.years)}`);
  if (d.months > 0) p.push(`${d.months} мес.`);
  if (d.days   > 0 || p.length === 0) p.push(`${d.days} ${pluralDays(d.days)}`);
  return p.join(' ');
}

/* ===== IMPORT DATA ===== */
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const incoming = Array.isArray(data) ? data : (data.events || []);
      if (!incoming.length) { toast('Файл пуст или неверный формат'); return; }

      const existing   = loadEvents();
      const existingIds = new Set(existing.map(ev => ev.id));

      let added = 0;
      incoming.forEach(ev => {
        if (!ev.name || !ev.date) return;
        const id = ev.id || `${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
        if (existingIds.has(id)) return;
        existing.push({
          id,
          name:         ev.name,
          date:         ev.date,
          note:         ev.note || '',
          type:         ev.type || 'annual',
          category:     ev.category || null,
          color:        ev.color || null,
          done:         ev.done || false,
          reminder:     ev.reminder || false,
          reminderDays: ev.reminderDays || [],
          createdAt:    ev.createdAt || Date.now()
        });
        added++;
      });

      saveEvents(existing);
      renderEvents();
      toast(`Импортировано: <strong>${added}</strong> событий ✓`);
    } catch (err) {
      toast('Ошибка чтения файла. Проверьте формат JSON.');
      console.error(err);
    } finally {
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

function downloadData() {
  const evs = loadEvents();
  if (!evs.length) { toast('Нет событий для экспорта'); return; }

  const data = {
    exported: new Date().toISOString().slice(0, 10),
    events: evs.map(ev => ({
      id:          ev.id,
      name:        ev.name,
      date:        ev.date,
      note:        ev.note || '',
      type:        ev.type || 'annual',
      category:    ev.category || null,
      color:       ev.color || null,
      done:        ev.done || false,
      reminder:    ev.reminder || false,
      reminderDays: ev.reminderDays || [],
      createdAt:   ev.createdAt || null
    }))
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `countdown-${data.exported}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast(`Данные (${evs.length} событий) скачаны ✓`);
}

/* ===== INIT ===== */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDrawer(); closeModal(); }
});

// Add shake animation
const style = document.createElement('style');
style.textContent = `@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }`;
document.head.appendChild(style);

function initApp() {
  events = loadEvents();
  checkMonthEnd();
  updateHeaderDate();
  renderEvents();
  checkDailyReminders();
  scheduleReminders();
}

// Гарантируем запуск после полной загрузки DOM
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initApp);
} else {
  initApp();
}

// Обновление при возврате в приложение (из фона)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    events = loadEvents();
    renderEvents();
  }
});

// Update every minute
setInterval(() => {
  updateHeaderDate();
  renderEvents();
}, 60000);

// Register service worker (PWA offline support)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.update(); // принудительно проверяем обновления при каждом запуске
  }).catch(() => {});
}
