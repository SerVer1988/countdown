<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Отсчёт">
<meta name="description" content="Контроль за важными датами">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.png" type="image/png">
<link rel="apple-touch-icon" href="icon.png">
<title>Обратный отсчёт</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --bg2: #161618;
    --bg3: #1e1e21;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede8;
    --text2: #9a9490;
    --text3: #5e5a56;
    --amber: #e8a030;
    --amber2: #c47e18;
    --amber-dim: rgba(232,160,48,0.12);
    --teal: #3ecfa0;
    --teal-dim: rgba(62,207,160,0.1);
    --red: #e05555;
    --red-dim: rgba(224,85,85,0.1);
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    padding-bottom: 4rem;
  }

  /* --- NOISE TEXTURE --- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  /* --- HEADER --- */
  header {
    position: relative;
    z-index: 1;
    padding: 3rem 2rem 2rem;
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .logo h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }

  .logo span {
    color: var(--amber);
  }

  .logo p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .today-badge {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
  }

  .today-badge strong {
    color: var(--amber);
    font-weight: 500;
  }

  /* --- MAIN LAYOUT --- */
  main {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 2rem;
  }

  /* --- ADD BUTTON --- */
  .add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--amber);
    color: #1a0f00;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 18px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    width: 100%;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .add-btn:hover { background: #f0a830; }
  .add-btn:active { transform: scale(0.98); }

  .add-btn svg { width: 16px; height: 16px; }

  /* --- MODAL OVERLAY --- */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(4px);
  }

  .overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 2rem;
    width: 100%;
    max-width: 440px;
    animation: popIn 0.2s ease;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  .field {
    margin-bottom: 1rem;
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .field input, .field select, .field textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
    -webkit-appearance: none;
  }

  .field input[type="date"] {
    color-scheme: dark;
  }

  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--amber);
  }

  .field textarea {
    resize: vertical;
    min-height: 72px;
  }

  .reminder-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s;
  }

  .reminder-toggle:hover { border-color: var(--border2); }

  .reminder-toggle.active { border-color: var(--amber); background: var(--amber-dim); }

  .toggle-dot {
    width: 36px;
    height: 20px;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 10px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle-dot::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--text3);
    top: 2px;
    left: 2px;
    transition: transform 0.2s, background 0.2s;
  }

  .reminder-toggle.active .toggle-dot { background: var(--amber2); border-color: var(--amber); }
  .reminder-toggle.active .toggle-dot::after { transform: translateX(16px); background: #fff; }

  .toggle-label { font-size: 14px; color: var(--text2); }
  .reminder-toggle.active .toggle-label { color: var(--amber); }

  .reminder-days-row {
    display: none;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .reminder-days-row.visible { display: flex; }

  .day-chip {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    background: var(--bg3);
    transition: all 0.15s;
    user-select: none;
  }

  .day-chip.selected {
    background: var(--amber-dim);
    border-color: var(--amber);
    color: var(--amber);
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 1.5rem;
  }

  .btn-save {
    flex: 1;
    background: var(--amber);
    color: #1a0f00;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px;
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-save:hover { background: #f0a830; }

  .btn-cancel {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-cancel:hover { border-color: var(--border2); color: var(--text); }

  /* --- EMPTY STATE --- */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text3);
  }

  .empty-state svg { opacity: 0.3; margin-bottom: 1rem; }
  .empty-state p { font-size: 14px; }

  /* --- EVENTS LIST --- */
  .events-grid {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  /* --- EVENT CARD (compact 2-line row) --- */
  .event-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: var(--radius-sm);
    padding: 7px 10px 7px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    animation: fadeSlide 0.3s ease;
    transition: border-color 0.2s, background 0.15s;
  }

  .event-card:hover { background: var(--bg3); }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .event-card.past       { border-left-color: var(--text3); }
  .event-card.future     { border-left-color: var(--amber); }
  .event-card.today-card { border-left-color: var(--teal); }

  /* Row 1: name · date · bell · actions */
  .card-row1 {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .event-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .event-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text3);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .reminder-icon {
    color: var(--amber);
    flex-shrink: 0;
    display: flex;
    align-items: center;
  }
  .reminder-icon svg { width: 13px; height: 13px; }

  .event-card { cursor: pointer; }
  .event-card:hover { background: var(--bg3); }

  /* --- DRAWER --- */
  .drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }

  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 290px; max-width: 88vw;
    background: var(--bg2);
    border-left: 1px solid var(--border);
    z-index: 201;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .drawer-overlay.open .drawer { transform: translateX(0); }

  .drawer-head {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .drawer-close {
    position: absolute; top: 12px; right: 12px;
    width: 28px; height: 28px; border-radius: 6px;
    border: none; background: transparent;
    color: var(--text3); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .drawer-close:hover { background: var(--bg3); color: var(--text); }

  .drawer-ev-name {
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-bottom: 4px; padding-right: 32px; line-height: 1.3;
  }
  .drawer-ev-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text3);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .drawer-ev-cat {
    font-size: 10px; padding: 1px 7px;
    border-radius: 10px; font-weight: 600;
  }

  .drawer-actions { padding: 6px 0; overflow-y: auto; flex: 1; }

  .drawer-btn {
    display: flex; align-items: center; gap: 14px;
    width: 100%; padding: 14px 20px;
    background: transparent; border: none;
    color: var(--text); cursor: pointer;
    font-family: 'Manrope', sans-serif; font-size: 14px;
    text-align: left; transition: background 0.15s; border-radius: 0;
  }
  .drawer-btn:hover { background: var(--bg3); }
  .drawer-btn.danger { color: var(--red); }
  .drawer-btn svg { width: 18px; height: 18px; color: var(--text3); flex-shrink: 0; }
  .drawer-btn.danger svg { color: var(--red); }
  .drawer-btn.done-active svg { color: var(--teal); }
  .drawer-btn.done-active { color: var(--teal); }

  .drawer-sep {
    height: 1px; background: var(--border);
    margin: 4px 20px;
  }

  /* Row 2: countdown line */
  .card-row2 strong { font-weight: 600; }
  .future .card-row2 strong     { color: var(--amber); }
  .past .card-row2 strong       { color: var(--text); }
  .today-card .card-row2 strong { color: var(--teal); }

  .cnt-sep { color: var(--text3); }

  .cnt-suffix {
    color: var(--text3);
    margin-left: 4px;
  }

  /* --- NOTE ROW ON CARD --- */
  .card-row3 {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding-left: 1px;
    line-height: 1.4;
  }

  /* --- CATEGORY TAG ON CARD --- */
  .card-tag {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    opacity: 0.9;
  }

  /* --- EVENT TYPE TOGGLE --- */
  .type-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    width: fit-content;
    margin-top: 4px;
  }
  .type-btn {
    padding: 6px 18px;
    font-size: 13px;
    background: transparent;
    color: var(--text2);
    border: none;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    transition: all 0.15s;
  }
  .type-btn + .type-btn { border-left: 1px solid var(--border); }
  .type-btn:hover { background: var(--bg3); color: var(--text); }
  .type-btn.active { background: var(--amber-dim); color: var(--amber); font-weight: 600; }

  /* --- CATEGORY CHIPS IN MODAL --- */
  .cat-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .cat-chip {
    font-size: 12px; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg3);
    color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    user-select: none;
  }
  .cat-chip:hover { border-color: var(--border2); color: var(--text); }
  .cat-chip.selected { font-weight: 700; }

  /* --- COLOR SWATCHES IN MODAL --- */
  .color-swatches { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; align-items: center; }
  .color-swatch {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
    flex-shrink: 0; outline-offset: 2px;
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.selected { border-color: var(--text) !important; transform: scale(1.15); }
  .swatch-custom {
    width: 22px; height: 22px; border-radius: 50%; cursor: pointer; flex-shrink: 0;
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
    border: 2px solid transparent; position: relative; overflow: hidden; transition: transform 0.15s;
  }
  .swatch-custom:hover { transform: scale(1.2); }
  .swatch-custom input[type=color] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; border: none; padding: 0;
  }

  /* --- CATEGORY FILTER BAR --- */
  .cat-filter-bar {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px;
  }
  .cat-filter-btn {
    font-size: 11px; padding: 3px 11px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--bg2);
    color: var(--text3); cursor: pointer; transition: all 0.15s; white-space: nowrap;
    font-family: 'Manrope', sans-serif;
  }
  .cat-filter-btn:hover { background: var(--bg3); color: var(--text2); }
  .cat-filter-btn.active { color: var(--text); border-color: var(--border2); font-weight: 600; background: var(--bg3); }

  /* --- TOAST --- */
  #toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
  }

  .toast {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-left: 3px solid var(--amber);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    color: var(--text);
    font-size: 13px;
    max-width: 300px;
    animation: toastIn 0.3s ease;
    pointer-events: all;
  }

  .toast strong { color: var(--amber); }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* --- SECTIONS --- */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .section + .section { margin-top: 2.5rem; }

  /* --- MINI CALENDAR --- */
  .cal-widget {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px 10px;
    margin-bottom: 14px;
    display: none;
  }
  .cal-widget.open { display: block; }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .cal-nav {
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; line-height: 1;
  }
  .cal-nav:hover { border-color: var(--amber); color: var(--amber); }
  .cal-title {
    font-size: 13px; font-weight: 700;
    color: var(--text); letter-spacing: 0.03em;
    cursor: pointer; user-select: none;
  }
  .cal-title:hover { color: var(--amber); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-day-name {
    text-align: center; font-size: 9px; font-weight: 700;
    color: var(--text3); padding: 3px 0;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .cal-day {
    text-align: center; padding: 3px 1px;
    border-radius: 6px; cursor: default;
    display: flex; flex-direction: column;
    align-items: center; gap: 2px; min-height: 34px;
  }
  .cal-day-num {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: var(--text2); width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; line-height: 1; flex-shrink: 0;
  }
  .cal-day.other-month .cal-day-num { color: var(--text3); opacity: 0.35; }
  .cal-day.is-today .cal-day-num { background: var(--amber); color: #000; font-weight: 700; }
  .cal-day.has-event { cursor: pointer; }
  .cal-day.has-event:hover { background: var(--bg3); }
  .cal-day.cal-selected { background: var(--bg3); outline: 1px solid var(--border2); }
  .cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
  .cal-dot  { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }

  .cal-filter-hint {
    font-size: 11px; color: var(--amber); text-align: center;
    margin-top: 8px; cursor: pointer; padding: 2px;
  }
  .cal-filter-hint:hover { text-decoration: underline; }

  /* --- TOOLBAR ROW --- */
  .toolbar-row {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .tool-btn {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 4px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg2); color: var(--text3);
    cursor: pointer; font-family: 'Manrope', sans-serif;
    font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
    transition: all 0.15s; white-space: nowrap;
  }
  .tool-btn svg { width: 15px; height: 15px; }
  .tool-btn:hover { color: var(--text); border-color: var(--amber); background: var(--amber-dim); }

  /* --- SORT BAR --- */
  .sort-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .sort-btn {
    flex: 1;
    padding: 7px 4px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text3);
    font-size: 12px; font-weight: 600;
    font-family: 'Manrope', sans-serif;
    cursor: pointer; text-align: center;
    transition: all 0.15s;
  }

  .sort-btn:hover  { background: var(--bg3); color: var(--text2); }
  .sort-btn.active { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }

  /* --- RESPONSIVE --- */
  @media (max-width: 600px) {
    header { padding: 2rem 1rem 1.5rem; }
    main { padding: 0 1rem; }
    .events-grid { grid-template-columns: 1fr; }
    .countdown-num { font-size: 2.2rem; }
  }

  .dl-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg2);
    color: var(--text2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .dl-btn:hover { color: var(--text); border-color: var(--amber); background: var(--amber-dim); }
  .dl-btn svg { width: 14px; height: 14px; }

  /* --- DONE / ARCHIVE --- */
  .event-card.done { opacity: 0.5; }
  .event-card.done .event-name { text-decoration: line-through; color: var(--text3); }

  .archive-toggle {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600; color: var(--text3);
    cursor: pointer; padding: 10px 0 6px;
    border-top: 1px solid var(--border);
    margin-top: 12px; user-select: none; letter-spacing: 0.04em; text-transform: uppercase;
    transition: color 0.15s;
  }
  .archive-toggle:hover { color: var(--text2); }
  .archive-toggle svg { width: 12px; height: 12px; transition: transform 0.2s; flex-shrink: 0; }
  .archive-toggle.open svg { transform: rotate(90deg); }
  .archive-body { display: none; padding-top: 6px; }
  .archive-body.open { display: block; }

  /* --- CATEGORY EMOJI ON CARD --- */
  .cat-emoji-inline {
    font-size: 12px;
    margin-left: 4px;
    vertical-align: middle;
    line-height: 1;
  }

  /* --- ROW2: Прошло слева, Через правее центра --- */
  .card-row2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    padding-left: 1px;
    display: flex;
    align-items: center;
  }
  .card-row2 > span:first-child { flex: 0 0 52%; }
  .card-row2 > span:last-child  { flex: 0 0 48%; text-align: left; }

  .lbl-passed    { color: #60a5fa; }
  .lbl-remaining { color: var(--amber); }
  .future .card-row2 .lbl-remaining strong { color: var(--amber); }
  .past   .card-row2 .lbl-remaining strong { color: var(--amber); }
  .future .card-row2 .lbl-remaining strong { color: var(--amber); }
  .past   .card-row2 .lbl-remaining strong { color: var(--amber); }

  /* --- CATEGORY MANAGER MODAL --- */
  .cat-mgr-list { margin-bottom: 16px; }
  .cat-mgr-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .cat-mgr-item:last-child { border-bottom: none; }
  .cat-mgr-emoji { font-size: 18px; flex-shrink: 0; }
  .cat-mgr-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cat-mgr-name  { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
  .cat-mgr-del {
    width: 26px; height: 26px; border: none; background: transparent;
    color: var(--text3); cursor: pointer; border-radius: 5px;
    display: flex; align-items: center; justify-content: center; transition: all 0.15s;
  }
  .cat-mgr-del:hover { color: var(--red); background: var(--red-dim); }
  .cat-mgr-del svg { width: 13px; height: 13px; }

  .add-cat-row {
    display: grid; grid-template-columns: 48px 1fr 36px;
    gap: 8px; align-items: center; margin-top: 10px;
  }
  .inp-emoji {
    text-align: center; font-size: 20px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 6px 4px;
    color: var(--text); width: 100%; outline: none;
  }
  .inp-emoji:focus { border-color: var(--amber); }
  .inp-catname {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 7px 10px;
    color: var(--text); font-size: 13px; font-family: 'Manrope', sans-serif;
    outline: none; width: 100%;
  }
  .inp-catname:focus { border-color: var(--amber); }
  .inp-cat-color {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--border); cursor: pointer; padding: 0;
    background: transparent;
  }
  .btn-add-cat {
    margin-top: 12px; width: 100%;
    background: var(--amber-dim); color: var(--amber);
    border: 1px solid var(--amber); border-radius: var(--radius-sm);
    padding: 8px; font-family: 'Manrope', sans-serif; font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-add-cat:hover { background: var(--amber); color: #000; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ===== TABS ===== */
  .tabs-bar {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
    padding: 0 1.5rem;
  }
  .tab-btn {
    flex: 1; padding: 14px 8px;
    background: transparent; border: none;
    color: var(--text3); font-family: 'Manrope', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .tab-btn:hover { color: var(--text2); }
  .tab-btn.active { color: var(--amber); border-bottom-color: var(--amber); }

  /* ===== PROFILE SETUP ===== */
  .quest-section { padding: 0; }

  .profile-hero {
    text-align: center; padding: 2rem 0 1.5rem;
  }
  .profile-hero h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem; font-weight: 600;
    color: var(--text); margin-bottom: 6px;
  }
  .profile-hero p { font-size: 13px; color: var(--text3); line-height: 1.5; }

  .profile-section-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text3);
    margin: 20px 0 10px;
  }

  .directions-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 4px;
  }
  .dir-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg2);
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .dir-chip:hover { border-color: var(--border2); }
  .dir-chip.selected {
    border-color: var(--amber); background: var(--amber-dim);
  }
  .dir-chip-emoji { font-size: 18px; flex-shrink: 0; }
  .dir-chip-text { font-size: 12px; font-weight: 600; color: var(--text2); line-height: 1.3; }
  .dir-chip.selected .dir-chip-text { color: var(--amber); }

  .profile-field {
    margin-top: 16px;
  }
  .profile-field label {
    display: block; font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 8px;
  }
  .profile-field textarea, .profile-field input[type=text], .profile-field input[type=number] {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
    color: var(--text); font-family: 'Manrope', sans-serif; font-size: 13px;
    outline: none; resize: none; box-sizing: border-box;
    transition: border-color 0.15s;
  }
  .profile-field textarea:focus,
  .profile-field input:focus { border-color: var(--amber); }
  .profile-field textarea { min-height: 80px; }

  .goal-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }

  .btn-save-profile {
    width: 100%; margin-top: 24px; padding: 14px;
    background: var(--amber); color: #000;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save-profile:hover { opacity: 0.85; }

  /* ===== QUEST MAIN SCREEN ===== */
  .quest-header {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    margin-bottom: 14px;
  }
  .quest-month-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .quest-month { font-size: 13px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .quest-stars { font-size: 14px; font-weight: 700; color: var(--amber); }
  .quest-streak { font-size: 12px; color: var(--text2); }

  .quest-progress-bar {
    height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; margin-bottom: 10px;
  }
  .quest-progress-fill {
    height: 100%; background: var(--amber); border-radius: 3px;
    transition: width 0.5s ease;
  }

  .quest-prize {
    font-size: 12px; color: var(--text3);
    display: flex; align-items: center; gap: 6px;
  }
  .quest-prize span { color: var(--text2); font-weight: 600; }

  .quest-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 16px;
    margin-bottom: 14px;
  }
  .quest-card-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .quest-card-meta {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
  }
  .quest-meta-chip {
    font-size: 11px; padding: 3px 8px; border-radius: 10px;
    background: var(--bg3); color: var(--text3); font-weight: 600;
  }
  .quest-meta-chip.cat   { background: var(--amber-dim); color: var(--amber); }
  .quest-meta-chip.stars { color: var(--amber); }

  .quest-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem; font-weight: 600; color: var(--text);
    line-height: 1.3; margin-bottom: 10px;
  }
  .quest-desc {
    font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 12px;
  }
  .quest-tip {
    font-size: 12px; color: var(--text3); font-style: italic;
    padding: 10px 12px; background: var(--bg3); border-radius: var(--radius-sm);
    border-left: 2px solid var(--border2); margin-bottom: 16px;
  }

  .quest-actions {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .quest-done-btn {
    padding: 13px; border: none; border-radius: var(--radius-sm);
    font-family: 'Manrope', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.15s;
  }
  .quest-done-btn.yes { background: var(--teal); color: #fff; }
  .quest-done-btn.yes:hover { opacity: 0.85; }
  .quest-done-btn.no  { background: var(--bg3); color: var(--text3); border: 1px solid var(--border); }
  .quest-done-btn.no:hover  { color: var(--red); border-color: var(--red); }

  .quest-history {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px;
  }
  .quest-history-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text3); margin-bottom: 12px;
  }
  .quest-week-row {
    display: flex; gap: 6px;
  }
  .quest-day-dot {
    flex: 1; aspect-ratio: 1; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; background: var(--bg3);
  }
  .quest-day-dot.done   { background: var(--teal-dim); }
  .quest-day-dot.missed { background: var(--red-dim); }
  .quest-day-dot.today  { outline: 1px solid var(--amber); }

  .quest-loading {
    text-align: center; padding: 40px 0; color: var(--text3);
    font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .quest-spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--amber); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-edit-profile {
    width: 100%; padding: 10px; margin-top: 10px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: transparent; color: var(--text3);
    font-family: 'Manrope', sans-serif; font-size: 12px;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-edit-profile:hover { color: var(--text2); border-color: var(--border2); }

  /* ===== MONTH RESULT SCREEN ===== */
  .result-screen {
    text-align: center; padding: 2rem 0;
    display: flex; flex-direction: column; align-items: center; gap: 0;
  }
  .result-icon { font-size: 4rem; margin-bottom: 12px; animation: popIn 0.4s ease; }
  @keyframes popIn { from { transform: scale(0.5); opacity:0; } to { transform: scale(1); opacity:1; } }

  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 700; color: var(--text);
    margin-bottom: 6px;
  }
  .result-subtitle { font-size: 13px; color: var(--text3); margin-bottom: 24px; }

  .result-stats {
    width: 100%; display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 20px;
  }
  .result-stat {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 10px;
  }
  .result-stat-val { font-size: 1.5rem; font-weight: 700; color: var(--amber); line-height: 1; margin-bottom: 4px; }
  .result-stat-lbl { font-size: 11px; color: var(--text3); font-weight: 600; letter-spacing: 0.04em; }

  .result-prize-box {
    width: 100%; background: var(--amber-dim);
    border: 1px solid var(--amber); border-radius: var(--radius-sm);
    padding: 16px; margin-bottom: 20px;
  }
  .result-prize-lbl { font-size: 11px; color: var(--amber); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
  .result-prize-val { font-size: 16px; font-weight: 700; color: var(--text); }

  .result-missed-box {
    width: 100%; background: var(--bg2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 14px; margin-bottom: 20px;
    font-size: 13px; color: var(--text2); line-height: 1.5;
  }

  .result-btn {
    width: 100%; padding: 14px;
    border: none; border-radius: var(--radius-sm);
    font-family: 'Manrope', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s;
  }
  .result-btn.win  { background: var(--amber); color: #000; }
  .result-btn.lose { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .result-btn:hover { opacity: 0.85; }

  /* Streak bonus toast style */
  .toast.streak { background: var(--amber); color: #000; font-weight: 700; }</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>Обратный <span>отсчёт</span></h1>
    <p id="today-display">загрузка...</p>
  </div>

</header>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" id="tab-btn-dates" onclick="switchTab('dates')">📅 Даты</button>
  <button class="tab-btn"        id="tab-btn-quest" onclick="switchTab('quest')">⚡ Квест</button>
</div>

<main>
  <!-- ===== TAB: ДАТЫ ===== -->
  <div id="tab-dates">
  <button class="add-btn" onclick="openModal()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/>
    </svg>
    Добавить событие
  </button>

  <div class="toolbar-row">
    <button class="tool-btn" onclick="downloadData()" title="Экспорт данных">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="2" x2="8" y2="11"/><polyline points="5,8 8,11 11,8"/><path d="M3 14h10"/>
      </svg>
      Экспорт
    </button>
    <button class="tool-btn" onclick="document.getElementById('import-file').click()" title="Импорт данных">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="11" x2="8" y2="2"/><polyline points="5,5 8,2 11,5"/><path d="M3 14h10"/>
      </svg>
      Импорт
    </button>
    <button class="tool-btn" onclick="toggleCalendar()" id="cal-toggle-btn" title="Мини-календарь">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="2" y="3" width="12" height="11" rx="2"/>
        <line x1="5" y1="1" x2="5" y2="5"/><line x1="11" y1="1" x2="11" y2="5"/>
        <line x1="2" y1="7" x2="14" y2="7"/>
      </svg>
      Календарь
    </button>
    <button class="tool-btn" onclick="openCatManager()" title="Управление категориями">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <circle cx="8" cy="8" r="2"/><path d="M8 2v1M8 13v1M2 8h1M13 8h1M3.5 3.5l.7.7M11.8 11.8l.7.7M11.8 4.2l-.7.7M4.2 11.8l-.7.7"/>
      </svg>
      Категории
    </button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)"/>
  </div>

  <!-- MINI CALENDAR -->
  <div class="cal-widget" id="cal-widget">
    <div class="cal-header">
      <button class="cal-nav" onclick="calPrev()">‹</button>
      <span class="cal-title" id="cal-title" onclick="calGoToday()">—</span>
      <button class="cal-nav" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-filter-hint" id="cal-hint" style="display:none" onclick="calClearFilter()">
      ✕ Сбросить фильтр по дате
    </div>
  </div>

  <div class="sort-bar" id="sort-bar" style="display:none">
    <button class="sort-btn active" data-sort="closest" onclick="setSort(this,'closest')">По близости</button>
    <button class="sort-btn"        data-sort="added"   onclick="setSort(this,'added')">Недавно добавленные</button>
  </div>

  <div class="cat-filter-bar" id="cat-filter-bar" style="display:none"><!-- rendered by JS --></div>

  <div id="events-container"></div>

  </div><!-- /tab-dates -->

  <!-- ===== TAB: КВЕСТ ===== -->
  <div id="tab-quest" class="quest-section" style="display:none">
    <div id="quest-root"></div>
  </div>
</main>

<!-- MODAL -->
<div class="overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modal-title">Новое событие</h2>

    <div class="field">
      <label>Название *</label>
      <input type="text" id="inp-name" placeholder="Например: День рождения Маши" maxlength="80">
    </div>

    <div class="field">
      <label>Дата *</label>
      <input type="date" id="inp-date">
    </div>

    <div class="field">
      <label>Заметка</label>
      <textarea id="inp-note" placeholder="Дополнительная информация..."></textarea>
    </div>

    <div class="field">
      <label>Тип события</label>
      <div class="type-toggle">
        <button class="type-btn active" id="type-annual" onclick="setEventType('annual')">🔁 Ежегодное</button>
        <button class="type-btn"       id="type-once"   onclick="setEventType('once')">📌 Разовое</button>
      </div>
    </div>

    <div class="field">
      <label>Категория</label>
      <div class="cat-picker" id="cat-picker"><!-- rendered by JS --></div>
    </div>

    <div class="field">
      <label>Цвет события</label>
      <div class="color-swatches" id="color-swatches">
        <span class="color-swatch" data-color="#e879a0" onclick="selectSwatch(this)" style="background:#e879a0" title="Розовый"></span>
        <span class="color-swatch" data-color="#a855f7" onclick="selectSwatch(this)" style="background:#a855f7" title="Фиолетовый"></span>
        <span class="color-swatch" data-color="#ef4444" onclick="selectSwatch(this)" style="background:#ef4444" title="Красный"></span>
        <span class="color-swatch" data-color="#f97316" onclick="selectSwatch(this)" style="background:#f97316" title="Оранжевый"></span>
        <span class="color-swatch" data-color="#eab308" onclick="selectSwatch(this)" style="background:#eab308" title="Жёлтый"></span>
        <span class="color-swatch" data-color="#22c55e" onclick="selectSwatch(this)" style="background:#22c55e" title="Зелёный"></span>
        <span class="color-swatch" data-color="#60a5fa" onclick="selectSwatch(this)" style="background:#60a5fa" title="Синий"></span>
        <span class="color-swatch" data-color="#94a3b8" onclick="selectSwatch(this)" style="background:#94a3b8" title="Серый"></span>
        <span class="swatch-custom" title="Свой цвет">
          <input type="color" id="inp-color-custom" value="#ffffff" oninput="onCustomColor(this)">
        </span>

/* ===== DATE UTILS ===== */
function today() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function parseDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function diffDays(dateStr) {
  const t = today();
  const e = parseDate(dateStr);
  return Math.round((e - t) / 86400000);
}

function formatDateRu(dateStr) {
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const d = parseDate(dateStr);
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function todayStr() {
  const d = today();
  return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`;
}

function toInputDate(d) {
  return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
}

/* ===== HEADER DATE ===== */
function updateHeaderDate() {
  const d = today();
  const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  document.getElementById('today-display').textContent =
    `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
  document.getElementById('today-short').textContent = todayStr();
}

/* ===== SORT ===== */
function setSort(btn, type) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEvents();
}

function daysUntilNext(dateStr) {
  const t      = today();
  const parsed = parseDate(dateStr);
  const mm = parsed.getMonth(), dd = parsed.getDate();
  let next = new Date(t.getFullYear(), mm, dd);
  if (next <= t) next = new Date(t.getFullYear() + 1, mm, dd);
  return Math.round((next - t) / 86400000);
}

/* Происходит ли этот день/месяц ещё в этом году */
function isUpcomingThisYear(dateStr) {
  const t = today();
  const p = parseDate(dateStr);
  return new Date(t.getFullYear(), p.getMonth(), p.getDate()) >= t;
}

function sortedEvents() {
  const arr = [...events];
  if (currentSort === 'closest') arr.sort((a, b) => daysUntilNext(a.date) - daysUntilNext(b.date));
  else arr.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0)); // 'added' — самые новые сверху
  return arr;
}

/* ===== MONTH RESULTS ===== */
let pendingMonthResult = null;

function calcMonthStats(year, month) {
  const prefix  = `${year}-${String(month+1).padStart(2,'0')}`;
  const entries = Object.entries(questLog).filter(([k]) => k.startsWith(prefix) && !k.includes('_bonus'));
  let stars = 0, daysLogged = 0, daysDone = 0, bestStreak = 0, cur = 0;
  // Sort by date for streak calc
  entries.sort(([a],[b]) => a.localeCompare(b)).forEach(([,v]) => {
    stars += (v.stars || 0);
    if (v.done !== undefined) {
      daysLogged++;
      if (v.done) { daysDone++; cur++; bestStreak = Math.max(bestStreak, cur); }
      else cur = 0;
    }
  });
  // Count bonus stars
  Object.entries(questLog).filter(([k]) => k.startsWith(prefix+'_bonus'))
    .forEach(([,v]) => { stars += (v.stars||0); });
  return { stars, daysLogged, daysDone, bestStreak };
}

function checkMonthEnd() {
  if (!questProfile) return;
  const t       = today();
  const months  = JSON.parse(localStorage.getItem('quest_months') || '{}');
  const prevDate = new Date(t.getFullYear(), t.getMonth() - 1, 1);
  const prevKey  = `${prevDate.getFullYear()}-${String(prevDate.getMonth()+1).padStart(2,'0')}`;
  if (!months[prevKey]) {
    const stats = calcMonthStats(prevDate.getFullYear(), prevDate.getMonth());
    if (stats.daysLogged > 0) {
      const result = { ...stats, goal: questProfile.monthGoal, prize: questProfile.monthPrize,
        month: prevKey, win: stats.stars >= questProfile.monthGoal };
      months[prevKey] = result;
      localStorage.setItem('quest_months', JSON.stringify(months));
      pendingMonthResult = result;
    }
  }
}

async function copyApiKey() {
  const key = localStorage.getItem('quest_api_key') || document.getElementById('prof-apikey')?.value || '';

  try {

/* ===== MINI CALENDAR ===== */
let calYear  = today().getFullYear();
let calMonth = today().getMonth();
let calSelectedDate = null;

const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь',
                   'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAYS_SHORT = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

function getEventsForDay(y, m, d) {
  return events.filter(ev => {
    const dt = parseDate(ev.date);
    if (ev.type === 'once') {
      return dt.getFullYear() === y && dt.getMonth() === m && dt.getDate() === d;
    }
    return dt.getMonth() === m && dt.getDate() === d; // ежегодное — только месяц/день
  });
}

function getEventColor(ev) {
  if (ev.color) return ev.color;
  if (ev.category) return categories[ev.category]?.color || 'var(--amber)';
  return 'var(--amber)';
}

function renderCalendar() {
  const t = today();
  document.getElementById('cal-title').textContent = `${MONTHS_RU[calMonth]} ${calYear}`;

  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay  = new Date(calYear, calMonth + 1, 0);

  // Пн=0 ... Вс=6
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;

  let html = DAYS_SHORT.map(d => `<div class="cal-day-name">${d}</div>`).join('');

  // Дни предыдущего месяца
  for (let i = 0; i < startDow; i++) {
    const dt = new Date(calYear, calMonth, i - startDow + 1);
    html += `<div class="cal-day other-month"><div class="cal-day-num">${dt.getDate()}</div></div>`;
  }

  // Дни текущего месяца
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const isToday    = t.getFullYear() === calYear && t.getMonth() === calMonth && t.getDate() === d;
    const dateKey    = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEvts    = getEventsForDay(calYear, calMonth, d);
    const isSelected = calSelectedDate === dateKey;

    const dots = dayEvts.slice(0, 6).map(ev =>
      `<span class="cal-dot" style="background:${getEventColor(ev)}" title="${escapeHtml(ev.name)}"></span>`
    ).join('');

    const cls = ['cal-day',
      isToday    ? 'is-today'    : '',
      dayEvts.length ? 'has-event' : '',
      isSelected ? 'cal-selected' : '',
    ].filter(Boolean).join(' ');

    const click = dayEvts.length ? `onclick="calSelectDay('${dateKey}')"` : '';

    html += `<div class="${cls}" ${click}>
      <div class="cal-day-num">${d}</div>
      ${dots ? `<div class="cal-dots">${dots}</div>` : ''}
    </div>`;
  }

  // Дни следующего месяца
  const trailing = (startDow + lastDay.getDate()) % 7;
  if (trailing > 0) {
    for (let i = 1; i <= 7 - trailing; i++) {
      html += `<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
    }
  }

  document.getElementById('cal-grid').innerHTML = html;
  document.getElementById('cal-hint').style.display = calSelectedDate ? 'block' : 'none';
}

function calPrev() {
  if (--calMonth < 0) { calMonth = 11; calYear--; }
  calSelectedDate = null;
  renderCalendar(); renderEvents();
}

function calNext() {
  if (++calMonth > 11) { calMonth = 0; calYear++; }
  calSelectedDate = null;
  renderCalendar(); renderEvents();
}

function calSelectDay(dateKey) {
  calSelectedDate = calSelectedDate === dateKey ? null : dateKey;
  renderCalendar(); renderEvents();
}

function calClearFilter() {
  calSelectedDate = null;
  renderCalendar(); renderEvents();
}

function calGoToday() {
  const t = today();
  calYear = t.getFullYear(); calMonth = t.getMonth();
  calSelectedDate = null;
  renderCalendar(); renderEvents();
}

function toggleCalendar() {
  const w   = document.getElementById('cal-widget');
  const btn = document.getElementById('cal-toggle-btn');
  const open = w.classList.toggle('open');
  btn.style.color       = open ? 'var(--amber)' : '';
  btn.style.borderColor = open ? 'var(--amber)'  : '';
  btn.style.background  = open ? 'var(--amber-dim)' : '';
  if (open) renderCalendar();
}

  const picker = document.getElementById('cat-picker');
  if (!picker) return;
  picker.innerHTML = Object.entries(categories).map(([key, c]) =>
    `<span class="cat-chip${selectedKey === key ? ' selected' : ''}" data-cat="${key}" onclick="selectCat(this)"
      style="${selectedKey === key ? `border-color:${c.color};color:${c.color}` : ''}">
      ${c.emoji} ${c.name}
    </span>`
  ).join('');
}

function renderCatFilterBar() {
  const bar = document.getElementById('cat-filter-bar');
  if (!bar) return;

  // Только категории у которых есть хотя бы одно активное событие
  const usedCats = new Set(events.filter(e => !e.done && e.category).map(e => e.category));
  const entries  = Object.entries(categories).filter(([key]) => usedCats.has(key));

  if (entries.length === 0) {
    bar.style.display = 'none';
    activeCatFilter = 'all';
    return;
  }

  bar.style.display = 'flex';
  bar.innerHTML = entries.map(([key, c]) => {
    const isActive = activeCatFilter === key;
    const activeStyle = isActive ? `border-color:${c.color};color:${c.color};background:${c.color}22` : '';
    return `<button class="cat-filter-btn${isActive ? ' active' : ''}" data-cat="${key}"
      onclick="setCatFilter('${key}')" style="${activeStyle}">${c.emoji} ${c.name}</button>`;
  }).join('');
}

/* ===== CATEGORY MANAGER ===== */
let archiveOpen = false;

function openCatManager() {
  renderCatMgrList();
  document.getElementById('cat-modal-overlay').classList.add('open');
}
function closeCatManager() {
  document.getElementById('cat-modal-overlay').classList.remove('open');
  renderCatFilterBar();

}
function handleCatOverlayClick(e) {
  if (e.target.id === 'cat-modal-overlay') closeCatManager();

function renderCatMgrList() {

    <div class="cat-mgr-item">
      <span class="cat-mgr-emoji">${c.emoji}</span>
      <span class="cat-mgr-dot" style="background:${c.color}"></span>

      </button>

function addCategory() {
  const emoji = document.getElementById('new-cat-emoji').value.trim() || '🏷';
  const name  = document.getElementById('new-cat-name').value.trim();
  const color = document.getElementById('new-cat-color').value;
  if (!name) { document.getElementById('new-cat-name').focus(); return; }
  const key = 'cat_' + Date.now().toString(36);
  categories[key] = { emoji, name, color };
  saveCategories();
  document.getElementById('new-cat-emoji').value = '';
  document.getElementById('new-cat-name').value  = '';
  renderCatMgrList();
  toast(`Категория «${escapeHtml(name)}» добавлена ✓`);

function deleteCategory(key) {
  if (!categories[key]) return;
  const name = categories[key].name;
  delete categories[key];
  saveCategories();
  if (activeCatFilter === key) activeCatFilter = 'all';
  renderCatMgrList();
  toast(`Категория «${escapeHtml(name)}» удалена`);
}

function toggleDone(id) {

  if (!ev) return;

function toggleArchive() {

  const toggle = document.getElementById('arch-toggle');

  if (toggle) toggle.classList.toggle('open', archiveOpen);

/* ===== TASK GENERATION ===== */

function getUpcomingEventsContext() {
  const t = today();
  const result = [];
  for (let ahead = 0; ahead <= 3; ahead++) {
    const check = new Date(t.getFullYear(), t.getMonth(), t.getDate() + ahead);
    const mm = check.getMonth(), dd = check.getDate();
    events.filter(ev => {
      const p = parseDate(ev.date);
      return ev.type === 'once'
        ? p.getFullYear() === check.getFullYear() && p.getMonth() === mm && p.getDate() === dd
        : p.getMonth() === mm && p.getDate() === dd;
    }).forEach(ev => {
      const when = ahead === 0 ? 'Сегодня' : ahead === 1 ? 'Завтра' : `Через ${ahead} дня`;
      const cat  = ev.category ? (categories[ev.category]?.name || '') : '';
      result.push(`${when}: "${ev.name}"${cat ? ` (${cat})` : ''}${ev.note ? ' — ' + ev.note : ''}`);
    });
  }
  return result;
}

function getRecentTaskTitles() {
  const t = today();
  const titles = [];
  for (let i = 1; i <= 14; i++) {
    const d   = new Date(t.getFullYear(), t.getMonth(), t.getDate() - i);
    const log = questLog[questDateKey(d)];
    if (log?.task?.title) titles.push(log.task.title);
  }
  return titles;
}

async function generateDailyTask() {
  const todayKey = questDateKey(today());
  const apiKey   = localStorage.getItem('quest_api_key');
  const proxyUrl = (localStorage.getItem('quest_proxy_url') || '').trim();
  const endpoint = proxyUrl || 'https://api.anthropic.com/v1/messages';

  if (!apiKey) {
    questLog[todayKey] = { task: {
      title: 'API ключ не указан',
      description: 'Перейди в «Изменить профиль» и введи Anthropic API Key в нижнем поле.',
      category: 'Настройка', categoryEmoji: '⚙️',
      difficulty: 'easy', duration: '2 минуты',
      tip: 'Ключ на console.anthropic.com → API Keys', type: 'info'
    }, generatedAt: Date.now() };
    localStorage.setItem('quest_log', JSON.stringify(questLog));
    renderQuestScreen(); return;
  }

  const dirLabels = questProfile.directions.map(k => {
    const d = DIRECTIONS.find(x => x.key === k);
    return d ? `${d.emoji} ${d.label}` : k;
  });
  const upcomingEvents = getUpcomingEventsContext();
  const recentTasks    = getRecentTaskTitles();
  const stars  = questStarsThisMonth();
  const streak = questStreakDays();
  const t      = today();
  const dateStr = t.toLocaleDateString('ru', {weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const systemPrompt = `Ты персональный коуч в приложении саморазвития. Генерируешь ОДНО практичное задание на день.
Отвечай ТОЛЬКО валидным JSON без markdown и без лишнего текста.
Формат: {"title":"до 65 символов","description":"3-4 конкретных предложения","category":"название","categoryEmoji":"эмодзи","difficulty":"easy|medium|hard","duration":"X минут","tip":"1 совет","type":"interest|event|fact|media"}
easy=1⭐(5-15мин), medium=2⭐(15-30мин), hard=3⭐(30+мин). Пиши на русском.`;

  const userPrompt = `Дата: ${dateStr}
Направления: ${dirLabels.join(', ')}
О себе: ${questProfile.about || 'не указано'}
Прогресс: ⭐${stars}/${questProfile.monthGoal} | 🔥${streak}дн.
Предстоящие события:
${upcomingEvents.length ? upcomingEvents.join('\n') : 'нет'}
Недавние задания (не повторять):
${recentTasks.map((x,i)=>`${i+1}. ${x}`).join('\n')||'нет'}
Если есть события завтра/послезавтра — приоритет им.`;

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 20000);

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      signal: controller.signal,
      headers: {
        'Content-Type':      'application/json',
        'x-api-key':         apiKey,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    clearTimeout(timer);

    if (res.status === 401) throw new Error('auth');
    if (res.status === 429) throw new Error('rate_limit');
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || `HTTP ${res.status}`); }

    const data  = await res.json();
    const raw   = data.content?.[0]?.text || '';
    const task  = JSON.parse(raw.replace(/```json|```/g,'').trim());

    questLog[todayKey] = { task, generatedAt: Date.now() };
    localStorage.setItem('quest_log', JSON.stringify(questLog));
    renderQuestScreen();

  } catch (err) {
    clearTimeout(timer);
    console.error('Quest generation error:', err);

    let msg  = escapeHtml(err.message || 'Неизвестная ошибка');
    let hint = '';

    if (err.name === 'AbortError') {
      msg = 'Превышено время ожидания (20 сек). Проверь интернет.';
    } else if (err.message === 'auth') {
      msg = '❌ Неверный API ключ. Проверь ключ в профиле.';
    } else if (err.message === 'rate_limit') {
      msg = '⏳ Превышен лимит запросов. Попробуй через минуту.';
    } else if (err.name === 'TypeError' || msg.includes('fetch') || msg.includes('Failed') || msg.includes('Network')) {
      msg  = '🚫 CORS: браузер заблокировал запрос к API';
      hint = `<div style="font-size:12px;color:var(--text2);text-align:left;background:var(--bg3);padding:12px;border-radius:8px;margin:10px 0;line-height:1.7">
        <b>Нужен прокси-сервер.</b> Создай бесплатно за 3 мин:<br>
        1. Зайди на <a href="https://workers.cloudflare.com" target="_blank" style="color:var(--amber)">workers.cloudflare.com</a> → Create Worker<br>
        2. Вставь код (кнопка ниже) → Deploy<br>
        3. Скопируй URL воркера (вида <i>xxx.workers.dev</i>)<br>
        4. Введи его в поле <b>Proxy URL</b> в профиле
      </div>
      <button onclick="showWorkerCode()" style="width:100%;padding:9px;border:1px solid var(--amber);border-radius:6px;background:var(--amber-dim);color:var(--amber);cursor:pointer;font-weight:700;font-size:12px;margin-bottom:6px">
        📋 Скопировать код Cloudflare Worker
      </button>`;
    }

    const card = document.querySelector('.quest-card');
    if (card) card.innerHTML = `
      <div style="padding:16px 0">
        <div style="text-align:center;font-size:2rem;margin-bottom:8px">⚠️</div>
        <div style="text-align:center;font-size:13px;color:var(--text2);margin-bottom:4px">${msg}</div>
        ${hint}
        <button onclick="retryGenerateTask()" style="width:100%;padding:10px;
          background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber);
          border-radius:6px;cursor:pointer;font-family:Manrope,sans-serif;font-weight:700;font-size:13px">
          🔄 Попробовать снова
        </button>
      </div>`;
  }
}

    if (request.method === 'OPTIONS') {
      return new Response(null, { headers: {
        'Access-Control-Allow-Origin': '*',
        'Access-Control-Allow-Methods': 'POST, OPTIONS',

};`;

  overlay.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="color:#fff;font-weight:700;font-size:14px">Cloudflare Worker — вставь в редактор</span>
      <button onclick="this.closest('div[style*=fixed]').remove()" style="background:var(--amber);color:#000;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-weight:700">✕</button>
    </div>
    <textarea readonly style="flex:1;width:100%;background:#1e1e2e;color:#cdd6f4;border:1px solid #444;border-radius:8px;padding:12px;font-size:11px;font-family:monospace;resize:none;box-sizing:border-box">${code}</textarea>
    <button onclick="navigator.clipboard?.writeText(this.previousElementSibling.value).then(()=>alert('Скопировано!'))" style="margin-top:8px;padding:12px;background:var(--amber);color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:14px">
      📋 Скопировать
    </button>`;
  document.body.appendChild(overlay);
}

function retryGenerateTask() {
  const todayKey = questDateKey(today());
  delete questLog[todayKey];
  localStorage.setItem('quest_log', JSON.stringify(questLog));
  renderQuestScreen();
}

/* ===== QUEST SCREEN ===== */
function questDateKey(d) {
  return d.toISOString().slice(0,10);
}

function questStarsThisMonth() {
  const now   = today();
  const prefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  return Object.entries(questLog)
    .filter(([k]) => k.startsWith(prefix))
    .reduce((sum,[,v]) => sum + (v.stars||0), 0);
}

function questStreakDays() {
  let streak = 0;
  const t = today();
  for (let i = 0; i < 60; i++) {
    const d   = new Date(t.getFullYear(), t.getMonth(), t.getDate() - i);
    const key = questDateKey(d);
    const log = questLog[key];
    if (!log || log.done === undefined) break;
    if (log.done) streak++;
    else break;
  }
  return streak;
}

function renderQuestScreen() {
  const root   = document.getElementById('quest-root');
  const now    = today();
  const stars  = questStarsThisMonth();
  const goal   = questProfile.monthGoal || 35;
  const streak = questStreakDays();
  const pct    = Math.min(100, Math.round(stars / goal * 100));

  const MONTHS_GEN = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const monthLabel = `${MONTHS_GEN[now.getMonth()]} ${now.getFullYear()}`;

  // История последних 7 дней
  const historyDots = Array.from({length:7}, (_,i) => {
    const d   = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 6 + i);
    const key = questDateKey(d);
    const log = questLog[key];
    const isToday = i === 6;
    let cls = 'quest-day-dot', icon = '○';
    if (log?.done === true)  { cls += ' done';   icon = '✓'; }
    if (log?.done === false) { cls += ' missed'; icon = '✗'; }
    if (isToday) cls += ' today';
    return `<div class="${cls}" title="${key}">${icon}</div>`;
  }).join('');

  // Текущий лог за сегодня
  const todayKey  = questDateKey(now);
  const todayLog  = questLog[todayKey];
  const answered  = todayLog && todayLog.done !== undefined;

  let taskBlock;
  if (!todayLog || !todayLog.task) {
    taskBlock = `
      <div class="quest-loading">
        <div class="quest-spinner"></div>
        <span>Генерация задания дня...</span>
      </div>`;
  } else if (answered) {
    const icon = todayLog.done ? '✓' : '✗';
    const col  = todayLog.done ? 'var(--teal)' : 'var(--red)';
    taskBlock = `
      <div style="text-align:center;padding:20px 0;color:${col}">
        <div style="font-size:2.5rem">${icon}</div>
        <div style="font-size:14px;font-weight:700;margin-top:8px">${todayLog.done ? 'Выполнено! +'+todayLog.stars+'⭐' : 'Пропущено −1⭐'}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">${todayLog.task?.title||''}</div>
      </div>`;
  } else {
    const t = todayLog.task;
    const starsStr = '⭐'.repeat(t.difficulty === 'easy' ? 1 : t.difficulty === 'hard' ? 3 : 2);
    taskBlock = `
      <div class="quest-card-label">
        Задание на сегодня
        <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0">${new Date().toLocaleDateString('ru',{day:'numeric',month:'long'})}</span>
      </div>
      <div class="quest-card-meta">
        <span class="quest-meta-chip cat">${t.categoryEmoji||''} ${t.category||''}</span>
        <span class="quest-meta-chip">${t.duration||''}</span>
        <span class="quest-meta-chip stars">${starsStr}</span>
      </div>
      <div class="quest-title">${escapeHtml(t.title)}</div>
      <div class="quest-desc">${escapeHtml(t.description)}</div>
      ${t.tip ? `<div class="quest-tip">💡 ${escapeHtml(t.tip)}</div>` : ''}
      <div class="quest-actions">
        <button class="quest-done-btn yes" onclick="markQuest(true)">✓ Выполнено</button>
        <button class="quest-done-btn no"  onclick="markQuest(false)">✗ Пропустить</button>
      </div>`;
  }

  root.innerHTML = `
    <div class="quest-header">
      <div class="quest-month-row">
        <span class="quest-month">${monthLabel}</span>
        <span class="quest-stars">⭐ ${stars} / ${goal}</span>
      </div>
      <div class="quest-progress-bar">
        <div class="quest-progress-fill" style="width:${pct}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="quest-prize">🎁 <span>${questProfile.monthPrize || 'Нет приза'}</span></div>
        ${streak > 0 ? `<div class="quest-streak">🔥 ${streak} ${streak===1?'день':streak<5?'дня':'дней'} подряд</div>` : ''}
      </div>
    </div>

    <div class="quest-card">${taskBlock}</div>

    <div class="quest-history">
      <div class="quest-history-label">Последние 7 дней</div>
      <div class="quest-week-row">${historyDots}</div>
    </div>

    <button class="btn-edit-profile" onclick="renderProfileForm(questProfile)">⚙ Изменить профиль</button>
    <button class="btn-edit-profile" style="margin-top:6px" onclick="renderHistoryScreen()">📊 История месяцев</button>`;

  // Если задание ещё не сгенерировано — запускаем генерацию
  if (!todayLog || !todayLog.task) {
    generateDailyTask();
  }
}

function markQuest(done) {
  const key  = questDateKey(today());
  const log  = questLog[key];
  if (!log) return;
  const stars = done
    ? (log.task.difficulty === 'easy' ? 1 : log.task.difficulty === 'hard' ? 3 : 2)
    : -1;
  questLog[key] = { ...log, done, stars };
  localStorage.setItem('quest_log', JSON.stringify(questLog));

  // Бонус за серию каждые 7 дней
  if (done) {
    const streak = questStreakDays();
    if (streak > 0 && streak % 7 === 0) {
      const bonusKey = `${questDateKey(today())}_bonus_streak${streak}`;
      if (!questLog[bonusKey]) {
        questLog[bonusKey] = { stars: 5, type: 'streak_bonus' };
        localStorage.setItem('quest_log', JSON.stringify(questLog));
        setTimeout(() => toast(`🔥 Серия ${streak} дней! +5⭐ бонус!`, 4000), 400);
      }
    }
  }

  renderQuestScreen();
}

function renderHistoryScreen() {
  const root   = document.getElementById('quest-root');
  const months = JSON.parse(localStorage.getItem('quest_months') || '{}');
  const entries = Object.entries(months).sort(([a],[b]) => b.localeCompare(a));
  const MONTHS_ACC = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

  if (!entries.length) {
    root.innerHTML = `
      <div style="text-align:center;padding:40px 0;color:var(--text3)">
        <div style="font-size:2.5rem;margin-bottom:12px">📊</div>
        <div style="font-size:13px">История месяцев пока пуста</div>
      </div>
      <button class="btn-edit-profile" onclick="renderQuestScreen()">← Назад</button>`;
    return;
  }

  const rows = entries.map(([key, r]) => {
    const [yr, mo] = key.split('-').map(Number);
    const name = `${MONTHS_ACC[mo-1]} ${yr}`;
    const win  = r.stars >= r.goal;
    return `<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:1.5rem">${win ? '🏆' : '💪'}</div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:700;color:var(--text)">${name}</div>
        <div style="font-size:11px;color:var(--text3)">⭐ ${r.stars}/${r.goal} · ✓ ${r.daysDone} дн. · 🔥 ${r.bestStreak} серия</div>
      </div>
      <div style="font-size:12px;font-weight:700;color:${win?'var(--amber)':'var(--text3)'}">
        ${win ? '+приз' : ''}
      </div>
    </div>`;
  }).join('');

  root.innerHTML = `
    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px">📊 История месяцев</div>
    <div>${rows}</div>
    <button class="btn-edit-profile" style="margin-top:16px" onclick="renderQuestScreen()">← Назад</button>`;
}

/* ===== RENDER ===== */
function renderEvents() {
  const container = document.getElementById('events-container');
  const sortBar   = document.getElementById('sort-bar');
  const filterBar = document.getElementById('cat-filter-bar');
  if (!container || !sortBar || !filterBar) return; // DOM ещё не готов

  if (events.length === 0) {
    sortBar.style.display  = 'none';
    filterBar.style.display = 'none';
    container.innerHTML = `
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="6" y="10" width="36" height="32" rx="4"/><line x1="16" y1="6" x2="16" y2="14"/>
          <line x1="32" y1="6" x2="32" y2="14"/><line x1="6" y1="20" x2="42" y2="20"/>
          <line x1="16" y1="30" x2="32" y2="30"/><line x1="24" y1="26" x2="24" y2="34"/>
        </svg>
        <p>Пока нет событий.<br>Нажмите «Добавить событие» чтобы начать.</p>
      </div>`;
    return;
  }

  sortBar.style.display    = 'flex';
  filterBar.style.display  = 'flex';
  renderCatFilterBar();

  let arr = sortedEvents();
  if (activeCatFilter !== 'all') arr = arr.filter(e => e.category === activeCatFilter);

  if (calSelectedDate) {
    const [sy, sm, sd] = calSelectedDate.split('-').map(Number);
    arr = arr.filter(ev => {
      const dt = parseDate(ev.date);
      if (ev.type === 'once') return dt.getFullYear() === sy && dt.getMonth() === sm - 1 && dt.getDate() === sd;
      return dt.getMonth() === sm - 1 && dt.getDate() === sd;
    });
  }

  // Разделяем активные и архивные
  const active = arr.filter(e => !e.done);
  const done   = arr.filter(e => e.done);

  let html = '';

  if (currentSort === 'closest') {
    const upcoming = active.filter(e => isUpcomingThisYear(e.date));
    const passed   = active.filter(e => !isUpcomingThisYear(e.date));

    if (upcoming.length) {
      html += `<div class="section"><div class="section-label">Предстоящие</div><div class="events-grid">`;
      upcoming.forEach(e => { try { html += cardHTML(e); } catch(err) { console.error('cardHTML error', e.id, err); } });
      html += `</div></div>`;
    }
    if (passed.length) {
      html += `<div class="section"><div class="section-label">Прошедшие в этом году</div><div class="events-grid">`;
      passed.forEach(e => { try { html += cardHTML(e); } catch(err) { console.error('cardHTML error', e.id, err); } });
      html += `</div></div>`;
    }
  } else {
    if (active.length) {
      html += `<div class="section"><div class="events-grid">`;
      active.forEach(e => { try { html += cardHTML(e); } catch(err) { console.error('cardHTML error', e.id, err); } });
      html += `</div></div>`;
    }
  }

  if (!active.length && !done.length) {
    html = `<p style="color:var(--text3);font-size:13px;text-align:center;padding:2rem 0">Нет событий в этой категории</p>`;
  }

  // Архив выполненных
  if (done.length) {
    html += `
      <div class="archive-toggle${archiveOpen?' open':''}" id="arch-toggle" onclick="toggleArchive()">
        <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="3,4 6,8 9,4"/>
        </svg>
        Архив выполненных · ${done.length}
      </div>
      <div class="archive-body${archiveOpen?' open':''}" id="arch-body">
        <div class="events-grid">
          ${done.map(e => cardHTML(e)).join('')}
        </div>
      </div>`;
  }

  container.innerHTML = html;
}

/* ===== DURATION CALC ===== */
function calcDuration(dateStr) {
  const t = today();
  const e = parseDate(dateStr);
  if (t.getTime() === e.getTime()) return { years:0, months:0, days:0, direction:'today' };

  const future = e > t;
  const [from, to] = future ? [t, e] : [e, t];

  let years  = to.getFullYear() - from.getFullYear();
  let months = to.getMonth()    - from.getMonth();
  let days   = to.getDate()     - from.getDate();

  if (days < 0) {
    months--;
    days += new Date(to.getFullYear(), to.getMonth(), 0).getDate();
  }
  if (months < 0) { years--; months += 12; }

  return { years, months, days, direction: future ? 'future' : 'past' };
}

/* Длительность между двумя Date-объектами */
function calcDurationBetween(from, to) {
  let years  = to.getFullYear() - from.getFullYear();
  let months = to.getMonth()    - from.getMonth();
  let days   = to.getDate()     - from.getDate();
  if (days < 0)   { months--; days += new Date(to.getFullYear(), to.getMonth(), 0).getDate(); }
  if (months < 0) { years--; months += 12; }
  return { years, months, days };
}

/* Ежегодная логика: прошло с реальной даты / осталось до следующего вхождения */
function calcAnnual(dateStr) {
  const t      = today();
  const parsed = parseDate(dateStr);
  if (t.getTime() === parsed.getTime()) return { isToday: true };

  const mm = parsed.getMonth(), dd = parsed.getDate();

  // ближайшее будущее вхождение этого дня/месяца
  let futureDate = new Date(t.getFullYear(), mm, dd);
  if (futureDate <= t) futureDate = new Date(t.getFullYear() + 1, mm, dd);

  return {
    isToday:   false,
    passed:    calcDurationBetween(parsed, t),       // с реальной даты события
    remaining: calcDurationBetween(t, futureDate)    // до следующего вхождения
  };
}

/* Форматирует {years, months, days} в строку с <strong> */
function fmtParts(d) {
  const p = [];
  if (d.years  > 0) p.push(`<strong>${d.years}</strong>&thinsp;${pluralYears(d.years)}`);
  if (d.months > 0) p.push(`<strong>${d.months}</strong>&thinsp;мес.`);
  if (d.days   > 0 || p.length === 0) p.push(`<strong>${d.days}</strong>&thinsp;${pluralDays(d.days)}`);
  return p.join(' ');
}

function formatDuration(dur) {
  if (dur.direction === 'today') return { line1: 'сегодня', line2: '' };

  const parts = [];
  if (dur.years  > 0) parts.push(`<strong>${dur.years}</strong>&thinsp;${pluralYears(dur.years)}`);
  if (dur.months > 0) parts.push(`<strong>${dur.months}</strong>&thinsp;мес.`);
  if (dur.days   > 0 || parts.length === 0) parts.push(`<strong>${dur.days}</strong>&thinsp;${pluralDays(dur.days)}`);

  const prefix = dur.direction === 'future' ? 'осталось' : 'прошло';
  return { line1: prefix, line2: parts.join('<span class="dur-sep">·</span>') };
}

function pluralYears(n) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return 'год';
  if ([2,3,4].includes(m10) && ![12,13,14].includes(m100)) return 'года';
  return 'лет';
}

function pluralMonths(n) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return 'месяц';
  if ([2,3,4].includes(m10) && ![12,13,14].includes(m100)) return 'месяца';
  return 'месяцев';
}

function pluralDays(n) {
  return 'д.';
}

function cardHTML(ev) {
  const dur = calcDuration(ev.date);
  let cardClass;
  if      (dur.direction === 'today')  cardClass = 'today-card';
  else if (dur.direction === 'future') cardClass = 'future';
  else                                  cardClass = 'past';

  // Border color: custom > category > default
  const cat = ev.category ? categories[ev.category] : null;
  const borderColor = ev.color || cat?.color || null;
  const borderStyle = borderColor ? `style="border-left-color:${borderColor}"` : '';

  // Category emoji (только смайл, без названия — компактно)
  const catEmoji = cat
    ? `<span class="card-cat-emoji" title="${cat.name}">${cat.emoji}</span>`
    : '';

  // Bell icon
  const bell = ev.reminder
    ? `<span class="reminder-icon" title="За ${ev.reminderDays.join(', ')} д.">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M8 2a5 5 0 0 1 5 5v2.5l1 1.5H2l1-1.5V7a5 5 0 0 1 5-5z"/>
          <line x1="8" y1="14" x2="8" y2="15"/><line x1="6.5" y1="15" x2="9.5" y2="15"/>
        </svg>
      </span>`
    : '';

  // Row 2: прошло (слева) + через (правее центра)
  const ann = calcAnnual(ev.date);
  let row2;
  if (ann.isToday) {
    row2 = `<span style="color:var(--teal)"><strong>сегодня 🎉</strong></span><span></span>`;
  } else if (ev.type === 'once') {
    const dur2 = calcDuration(ev.date);
    if (dur2.direction === 'future') {
      row2 = `<span></span><span><span class="lbl-remaining">Через:</span> ${fmtParts(dur2)}</span>`;
    } else {
      row2 = `<span><span class="lbl-passed">Прошло:</span> ${fmtParts(dur2)}</span><span></span>`;
    }
  } else {
    row2 = `<span><span class="lbl-passed">Прошло:</span> ${fmtParts(ann.passed)}</span><span><span class="lbl-remaining">Через:</span> ${fmtParts(ann.remaining)}</span>`;
  }

  // Row 3: note
  const row3 = ev.note
    ? `<div class="card-row3">📝 ${escapeHtml(ev.note)}</div>`
    : '';

  // Все действия — в шторке (openDrawer)
  return `
    <div class="event-card ${cardClass}${ev.done?' done':''}" id="card-${ev.id}" ${borderStyle} onclick="openDrawer('${ev.id}')">
      <div class="card-row1">
        <span class="event-name">${escapeHtml(ev.name)}${cat ? `<span class="cat-emoji-inline">${cat.emoji}</span>` : ''}</span>
        <span class="event-date">${formatDateRu(ev.date)}</span>
        ${bell}
      </div>
      <div class="card-row2">${row2}</div>
      ${row3}
    </div>`;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ===== CATEGORY & COLOR PICKERS ===== */
function selectCat(el) {
  const cat = el.dataset.cat;
  const wasSelected = el.classList.contains('selected');
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
  if (wasSelected) { selectedCat = null; return; }
  el.classList.add('selected');
  selectedCat = cat;
  const catColor = categories[cat]?.color;
  if (catColor && !selectedColor) {
    selectedColor = catColor;
    highlightSwatch(catColor);
  }
}

function selectSwatch(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  selectedColor = el.dataset.color;
}

function onCustomColor(input) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  selectedColor = input.value;
}

function highlightSwatch(color) {
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === color);
  });
}

function setEventType(type) {
  selectedType = type;
  document.getElementById('type-annual').classList.toggle('active', type === 'annual');
  document.getElementById('type-once').classList.toggle('active',   type === 'once');
}

function resetCatColor() {
  selectedCat   = null;
  selectedColor = null;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  document.getElementById('inp-color-custom').value = '#ffffff';
}

function setCatFilter(cat) {
  // Повторное нажатие снимает фильтр
  activeCatFilter = (activeCatFilter === cat) ? 'all' : cat;
  renderEvents();
}

function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Новое событие';
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-date').value = '';

function openEditModal(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Редактировать событие';

}

function handleOverlayClick(e) {

}

function resetReminder() {
  reminderActive = false;
  document.getElementById('reminder-toggle').classList.remove('active');
  document.getElementById('reminder-chips').classList.remove('visible');

function toggleReminder() {

  document.getElementById('reminder-toggle').classList.toggle('active', reminderActive);
